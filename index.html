<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This happens when some libraries try to polyfill fetch in an environment where it's a read-only getter.
      (function() {
        try {
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && descriptor.get && !descriptor.set) {
            Object.defineProperty(window, 'fetch', {
              get: descriptor.get,
              set: function() { console.warn('Ignored attempt to set window.fetch to prevent TypeError'); },
              configurable: true
            });
          }
        } catch (e) {
          // Ignore errors during patching
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
